name: Integración Continua - Grupo 7 - Chiesa_Goya_Iglina_Montini

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Descarga el código del repositorio
    - name: Checkout del código
      uses: actions/checkout@v4

    # 2. Configura el entorno con Node.js versión 22
    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm' # Esta opción optimiza y acelera las futuras ejecuciones guardando la caché

    # 3. PASO 3 CI: Instalar dependencias usando npm ci (Clean Install)
    # Nota: 'npm ci' es el comando ideal para servidores de CI porque instala estrictamente 
    # lo que dice el package-lock.json de forma limpia y exacta.
    - name: Instalar dependencias (Verificación de Integridad)
      run: npm ci

    # 4. PASO 4 y 5 CI: Ejecutar Unit Tests con reporte de cobertura de código
    - name: Ejecutar Unit Tests y Cobertura
      run: npm test -- --coverage

    # 5. Guardar los resultados de Code Coverage como un artefacto descargable
    - name: Subir reporte de Cobertura
      uses: actions/upload-artifact@v4
      with:
        name: reporte-cobertura
        path: coverage/